name: Feature request
description: Suggest an improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like to happen?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - TinyEngine C runtime
        - Metal kernels
        - Python binding
        - TinyAgent CLI/tools
        - Benchmarks
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Any compatibility, performance, dependency, or safety constraints?
