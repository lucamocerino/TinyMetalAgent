<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">TinyAgent terminal demo</title>
  <desc id="desc">A terminal-style demo showing TinyAgent creating a Matrix class and running unit tests locally.</desc>
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="980" height="560" rx="34" fill="#e2e8f0"/>
  <rect x="54" y="46" width="872" height="468" rx="24" fill="url(#frame)" filter="url(#shadow)"/>
  <rect x="54" y="46" width="872" height="58" rx="24" fill="url(#bar)"/>
  <path d="M54 80h872" stroke="#334155"/>

  <circle cx="88" cy="75" r="8" fill="#fb7185"/>
  <circle cx="116" cy="75" r="8" fill="#fbbf24"/>
  <circle cx="144" cy="75" r="8" fill="#34d399"/>
  <text x="490" y="82" text-anchor="middle" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="700">tinyagent local session</text>

  <g font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="19">
    <text x="86" y="140" fill="#38bdf8">tinyagent&gt;</text>
    <text x="210" y="140" fill="#e5e7eb">can you create a Matrix class and add unit tests?</text>

    <text x="86" y="186" fill="#94a3b8">→ tool write_file</text>
    <text x="270" y="186" fill="#64748b">matrix.py</text>
    <text x="86" y="224" fill="#94a3b8">✓ write_file</text>
    <text x="270" y="224" fill="#64748b">pure Python Matrix class</text>

    <text x="86" y="270" fill="#94a3b8">→ tool write_file</text>
    <text x="270" y="270" fill="#64748b">test_matrix.py</text>
    <text x="86" y="308" fill="#94a3b8">✓ write_file</text>
    <text x="270" y="308" fill="#64748b">unittest coverage for multiplication</text>

    <text x="86" y="354" fill="#94a3b8">→ tool run_shell</text>
    <text x="270" y="354" fill="#64748b">python3 -m unittest -q test_matrix</text>
    <text x="86" y="392" fill="#22c55e">✓ run_shell</text>
    <text x="270" y="392" fill="#22c55e">MATRIX_TESTS_OK</text>

    <rect x="82" y="424" width="802" height="52" rx="14" fill="#0f172a" stroke="#1e293b"/>
    <text x="106" y="457" fill="#e5e7eb">Matrix class and multiplication tests pass locally.</text>
    <text x="772" y="457" fill="#38bdf8">no cloud</text>
  </g>
</svg>
